<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="growthbook.js"></script>
    <script src="growthbook.js" defer></script>
    <link rel="stylesheet" href="./assets/css/index.css">
    <script src="./assets/js/index.js"></script>
    <link rel="stylesheet" href="./assets/css/HeaderStyle.css">
    <link rel="stylesheet" href="./assets/css/hero-banner.css">
    <link rel="stylesheet" href="./assets/css/shopForm.css">
</head>

<body>
    <!-- Header  -->
    <button id="open-shop-form">Mở form mua hàng</button>


    <!-- Shop Form -->
    <dialog id="shop-dialog">
        <button id="close-dialog">
            <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" viewBox="0 0 50 50">
                <path d="M 7.71875 6.28125 L 6.28125 7.71875 L 23.5625 25 L 6.28125 42.28125 L 7.71875 43.71875 L 25 26.4375 L 42.28125 43.71875 L 43.71875 42.28125 L 26.4375 25 L 43.71875 7.71875 L 42.28125 6.28125 L 25 23.5625 Z"></path>
            </svg>
        </button>

        <header class="dialog-header">           
            <div class="header-title">
                <h2 class="title-personal-info">Thông tin cá nhân</h2>
                <h2 class="title-address-info" hidden>Thông tin địa chỉ</h2>
            </div>
        </header>
        <div class="dialog-body">
            <form>
                <div class="personal-info">
                    <div class="info-item">
                        <label for="name">Họ và tên</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="info-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="info-item">
                        <label for="phone">Số điện thoại</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                </div>
                <div class="address-info" hidden>
                    <div class="info-item">
                        <label for="address">Thành phố</label>
                        <select name="city-selection" id="city-selection" class="" required>
                            <option value="default" class="">Chọn tỉnh/thành phố</option>
                            <option value="hanoi">Hà Nội</option>
                            <option value="hcm">Hồ Chí Minh</option>
                            <option value="danang">Đà Nẵng</option>
                            <option value="hai-phong">Hải Phòng</option>
                            <option value="can-tho">Cần Thơ</option>
                            <option value="nha-trang">Nha Trang</option>
                            <option value="quy-nhon">Quy Nhơn</option>
                            <option value="vung-tau">Vũng Tàu</option>
                            <option value="hue">Huế</option>
                            <option value="quang-ninh">Quảng Ninh</option>
                            <option value="thanh-hoa">Thanh Hóa</option>
                            <option value="nghe-an">Nghệ An</option>
                            <option value="binh-duong">Bình Dương</option>
                            <option value="binh-thuan">Bình Thuận</option>
                            <option value="long-an">Long An</option>
                            <option value="an-giang">An Giang</option>
                            <option value="dong-nai">Đồng Nai</option>
                            <option value="dong-thap">Đồng Tháp</option>
                            <option value="ben-tre">Bến Tre</option>
                            <option value="vinh-long">Vĩnh Long</option>
                            <option value="tien-giang">Tiền Giang</option>
                            <option value="tra-vinh">Trà Vinh</option>
                            <option value="soc-trang">Sóc Trăng</option>
                            <option value="bac-lieu">Bạc Liêu</option>
                            <option value="ca-mau">Cà Mau</option>
                        </select>
                    </div>

                    <div class="info-item">
                        <label for="district">Quận/Huyện</label>
                        <select name="district-selection" id="district-selection" class="" required>
                            <option value="default" class="">Chọn quận/huyện</option>
                        </select>
                    </div>

                    <div class="info-item">
                        <label for="ward">Phường/Xã/Thị trấn</label>
                        <select name="ward-selection" id="ward-selection" class="" required>
                            <option value="default" class="">Chọn phường/xã</option>
                        </select>
                    </div>

                    <div class="info-item">
                        <label for="detail-address">Đường, số nhà</label>
                        <input type="text" id="detail-address" name="detail-address">
                    </div>

                    <div class="info-item">
                        <label for="postal-code">Mã bưu điện:</label>
                        <input type="text" id="postal-code" name="postal-code">
                    </div>
                </div>
            </form>
        </div>
                
        
        <footer class="dialog_footer">
            <button class="return">Quay lại</button>
            <button class="next">Tiếp theo</button>
            <button class="pay" hidden>Thanh toán</button>
        </footer>
    </dialog>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const openShopFormButton = document.getElementById('open-shop-form');
        const shopDialog = document.getElementById('shop-dialog');
        const closeDialogButton = document.getElementById('close-dialog');
        openShopFormButton.addEventListener('click', () => {
            shopDialog.showModal();
        });

        closeDialogButton.addEventListener('click', () => {
            shopDialog.close();
        });

    })

        
    </script>
</body>
